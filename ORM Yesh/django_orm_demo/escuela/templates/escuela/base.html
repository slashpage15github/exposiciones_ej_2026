<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}CRUD Escuela{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:20px; }
    .box { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    nav a { margin-right:10px; text-decoration:none; color:#0d6efd; font-weight:bold; }
    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#f0f0f0; }
    .btn { padding:6px 10px; border:none; border-radius:6px; text-decoration:none; cursor:pointer; display:inline-block; }
    .p { background:#0d6efd; color:white; }
    .w { background:#ffc107; color:#222; }
    .d { background:#dc3545; color:white; }
    .s { background:#198754; color:white; }
    .g { background:#6c757d; color:white; }
    form.inline { display:inline; }
    input, select { width:100%; padding:8px; margin:6px 0 12px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>CRUD Escuela (MVC + ORM)</h1>

    <nav>
      <a href="{% url 'alumnos_list' %}">Alumnos</a>
      <a href="{% url 'inscripciones_list' %}">Inscripciones</a>
    </nav>
    <hr>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
