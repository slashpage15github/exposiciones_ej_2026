{% extends "escuela/base.html" %}
{% block title %}Eliminar alumno{% endblock %}

{% block content %}
<h2>Eliminar alumno</h2>
<p>¿Seguro que deseas eliminar a <strong>{{ alumno.nombre }}</strong>?</p>
<p><small>También se eliminarán sus inscripciones (CASCADE).</small></p>

<form method="POST">
  {% csrf_token %}
  <button class="btn d" type="submit">Sí, eliminar</button>
  <a class="btn g" href="{% url 'alumnos_list' %}">Cancelar</a>
</form>
{% endblock %}
