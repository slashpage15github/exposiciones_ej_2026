{% extends "escuela/base.html" %}
{% block title %}{{ modo }} inscripción{% endblock %}

{% block content %}
<h2>{{ modo }} inscripción</h2>

<form method="POST">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="btn s" type="submit">Guardar</button>
  <a class="btn g" href="{% url 'inscripciones_list' %}">Cancelar</a>
</form>
{% endblock %}
